<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Mandi Trendz</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            padding-top: 20px;
        }

        .admin-nav {
            background: #111;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D4AF37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logout-btn {
            background: #ff4d4d;
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .content-container {
            padding: 40px 10%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
        }

        .stat-card h3 {
            color: #D4AF37;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #888;
            font-size: 14px;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .add-btn {
            background: #D4AF37;
            color: #111;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-table-wrapper {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #222;
            color: #D4AF37;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        tr:hover {
            background: #222;
        }

        .stock-toggle {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .in-stock {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }

        .out-of-stock {
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
        }

        .form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #D4AF37;
        }

        .modal-content h2 {
            color: #D4AF37;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn {
            flex: 1;
            padding: 10px;
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            padding: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .actions-td {
            display: flex;
            gap: 10px;
        }

        .edit-btn {
            color: #D4AF37;
            font-size: 20px;
            cursor: pointer;
        }

        .delete-btn {
            color: #ff4d4d;
            font-size: 20px;
            cursor: pointer;
        }

        img.thumb {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            object-fit: cover;
            border: 1px solid #444;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="Images/Logo.jpg" alt="Mandi Trendz Logo" class="nav-logo">
                Mandi Trendz <span style="font-size: 12px; color: #888; margin-left: 10px;">(Admin)</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">View Site</a></li>
                <li><a href="admin.html" class="active">Inventory</a></li>
            </ul>

            <div class="nav-actions">
                <button onclick="logout()" class="logout-btn">Log Out</button>
                <div class="menu-toggle" id="mobile-menu">
                    <i class='bx bx-menu'></i>
                </div>
            </div>
        </nav>
    </header>

    <div class="content-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <h3 id="inStockCount">0</h3>
                <p>In Stock</p>
            </div>
            <div class="stat-card">
                <h3 id="outOfStockCount">0</h3>
                <p>Out of Stock</p>
            </div>
        </div>

        <div class="action-bar">
            <h2>Inventory Management</h2>
            <button class="add-btn" onclick="openModal()">
                <i class='bx bx-plus'></i> Add New Product
            </button>
        </div>

        <div class="product-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price (KES)</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <!-- Products will load here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="form-modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="Handbags">Handbags</option>
                        <option value="Tote Bags">Tote Bags</option>
                        <option value="Crossbody Bags">Crossbody Bags</option>
                        <option value="Shoulder Bags">Shoulder Bags</option>
                        <option value="Clutches">Clutches</option>
                        <option value="Backpacks">Backpacks</option>
                        <option value="Satchels">Satchels</option>
                        <option value="Mini Bags">Mini Bags</option>
                        <option value="Travel Bags">Travel Bags</option>
                        <option value="Accessories">Accessories (makeup bags, phone pouches)</option>
                        <option value="Laptop bags">Laptop bags</option>
                        <option value="Unisex bags">Unisex bags</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Price (KES)</label>
                    <input type="number" id="pPrice" required>
                </div>
                <div class="input-group">
                    <label>Product Image</label>
                    <input type="file" id="pImageFile" accept="image/*" style="margin-bottom: 5px;">
                    <p style="font-size: 12px; color: #888;">OR Image URL:</p>
                    <input type="url" id="pImageUrl" placeholder="https://example.com/image.jpg">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="pDescription" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="save-btn">Save Product</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Check Auth
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = 'login.html';
            loadProducts();
        }
        checkAuth();

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        async function loadProducts() {
            const { data: products, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = '';

            let inStock = 0;
            products.forEach(p => {
                if (p.in_stock) inStock++;
                tableBody.innerHTML += `
                    <tr>
                        <td><img src="${p.image_url}" class="thumb"></td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>${p.price.toLocaleString()}</td>
                        <td>
                            <span class="stock-toggle ${p.in_stock ? 'in-stock' : 'out-of-stock'}" 
                                  onclick="toggleStock(${p.id}, ${p.in_stock})">
                                ${p.in_stock ? 'In Stock' : 'Out of Stock'}
                            </span>
                        </td>
                        <td class="actions-td">
                            <i class='bx bx-edit edit-btn' onclick="editProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})"></i>
                            <i class='bx bx-trash delete-btn' onclick="deleteProduct(${p.id})"></i>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('inStockCount').textContent = inStock;
            document.getElementById('outOfStockCount').textContent = products.length - inStock;
        }

        async function toggleStock(id, currentStatus) {
            const { error } = await supabaseClient
                .from('products')
                .update({ in_stock: !currentStatus })
                .eq('id', id);
            if (!error) loadProducts();
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const { error } = await supabaseClient.from('products').delete().eq('id', id);
                if (!error) loadProducts();
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('.save-btn');
            submitBtn.textContent = 'Saving...';
            submitBtn.disabled = true;

            const id = document.getElementById('productId').value;
            const imageFile = document.getElementById('pImageFile').files[0];
            let imageUrl = document.getElementById('pImageUrl').value;

            try {
                // Handle Image Upload if file selected
                if (imageFile) {
                    const fileName = `${Date.now()}-${imageFile.name}`;
                    const { data: uploadData, error: uploadError } = await supabaseClient
                        .storage
                        .from('product-images')
                        .upload(fileName, imageFile);

                    if (uploadError) throw uploadError;

                    // Get Public URL
                    const { data: { publicUrl } } = supabaseClient
                        .storage
                        .from('product-images')
                        .getPublicUrl(fileName);

                    imageUrl = publicUrl;
                }

                const pData = {
                    name: document.getElementById('pName').value,
                    category: document.getElementById('pCategory').value,
                    price: document.getElementById('pPrice').value,
                    image_url: imageUrl,
                    description: document.getElementById('pDescription').value
                };

                if (id) {
                    const { error } = await supabaseClient.from('products').update(pData).eq('id', id);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient.from('products').insert([pData]);
                    if (error) throw error;
                }

                closeModal();
                loadProducts();
            } catch (err) {
                console.error("Save Error:", err);
                alert("Error saving product: " + err.message);
            } finally {
                submitBtn.textContent = 'Save Product';
                submitBtn.disabled = false;
            }
        });

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        function editProduct(p) {
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pCategory').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pImageUrl').value = p.image_url;
            document.getElementById('pDescription').value = p.description || '';
            document.getElementById('productModal').style.display = 'flex';
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const { error } = await supabase.from('products').delete().eq('id', id);
                if (!error) loadProducts();
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const pData = {
                name: document.getElementById('pName').value,
                category: document.getElementById('pCategory').value,
                price: document.getElementById('pPrice').value,
                image_url: document.getElementById('pImageUrl').value,
                description: document.getElementById('pDescription').value
            };

            if (id) {
                const { error } = await supabase.from('products').update(pData).eq('id', id);
                if (!error) { closeModal(); loadProducts(); }
            } else {
                const { error } = await supabase.from('products').insert([pData]);
                if (!error) { closeModal(); loadProducts(); }
            }
        });
    </script>
</body>

</html>
