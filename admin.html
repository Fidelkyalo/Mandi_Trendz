<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Mandi Trendz</title>
    <link rel="icon" href="Images/Logo.jpg" type="image/jpeg">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        /* ── Admin Navbar ── */
        .admin-nav {
            background: #111;
            padding: 14px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D4AF37;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 10px;
        }

        .admin-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .admin-nav .brand img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #D4AF37;
        }

        .admin-nav .brand span {
            font-size: 11px;
            color: #888;
            margin-left: 6px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-right a {
            color: #D4AF37;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid #D4AF37;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .nav-right a:hover {
            background: #D4AF37;
            color: #111;
        }

        .logout-btn {
            background: #ff4d4d;
            color: #fff !important;
            border: 1px solid #ff4d4d !important;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #cc0000 !important;
        }

        /* ── Main Content ── */
        .content-container {
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 20px 15px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: #D4AF37;
        }

        .stat-card h3 {
            color: #D4AF37;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .stat-card p {
            color: #888;
            font-size: 13px;
        }

        /* ── Action Bar ── */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-bar h2 {
            font-size: 20px;
            color: #D4AF37;
        }

        .add-btn {
            background: #D4AF37;
            color: #111;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #b8962e;
        }

        /* ── Desktop Table ── */
        .product-table-wrapper {
            background: #1a1a1a;
            border-radius: 12px;
            overflow-x: auto;
            /* horizontal scroll on small screens */
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 580px;
            /* prevent squishing */
        }

        th {
            background: #222;
            color: #D4AF37;
            padding: 14px 12px;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #202020;
        }

        /* ── Stock Badge ── */
        .stock-toggle {
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .stock-toggle:hover {
            opacity: 0.8;
        }

        .in-stock {
            background: rgba(0, 200, 83, 0.15);
            color: #00c853;
        }

        .out-of-stock {
            background: rgba(255, 77, 77, 0.15);
            color: #ff4d4d;
        }

        /* ── Action Icons ── */
        .actions-td {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .edit-btn,
        .delete-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .edit-btn {
            color: #D4AF37;
        }

        .edit-btn:hover {
            transform: scale(1.2);
        }

        .delete-btn {
            color: #ff4d4d;
        }

        .delete-btn:hover {
            transform: scale(1.2);
        }

        img.thumb {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #444;
        }

        /* ── Mobile Card View (hidden on desktop) ── */
        .product-cards-mobile {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .product-card-mobile {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .product-card-mobile img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid #444;
        }

        .product-card-mobile .info {
            flex: 1;
            min-width: 0;
        }

        .product-card-mobile .name {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-card-mobile .meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .product-card-mobile .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ── Modal ── */
        .form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 28px 24px;
            border-radius: 15px;
            width: 100%;
            max-width: 480px;
            border: 1px solid #D4AF37;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: #D4AF37;
            margin-bottom: 18px;
            font-size: 18px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .save-btn {
            flex: 1;
            padding: 12px;
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #b8962e;
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cancel-btn {
            flex: 1;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .cancel-btn:hover {
            background: #444;
        }

        /* ── Loading / Empty States ── */
        .loading-row td {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .admin-nav {
                padding: 12px 4%;
            }

            .admin-nav .brand {
                font-size: 15px;
            }

            .content-container {
                padding: 20px 4%;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .stat-card h3 {
                font-size: 22px;
            }

            .stat-card p {
                font-size: 12px;
            }

            /* Stack action bar + full-width Add button */
            .action-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .action-bar h2 {
                font-size: 17px;
            }

            .add-btn {
                justify-content: center;
                width: 100%;
            }

            /* Hide desktop table, show mobile cards */
            .product-table-wrapper {
                display: none;
            }

            .product-cards-mobile {
                display: flex;
            }

            /* Bottom-sheet modal on mobile */
            .form-modal {
                align-items: flex-end;
                justify-content: center;
                padding: 0;
            }

            .modal-content {
                border-radius: 20px 20px 0 0;
                max-width: 100%;
                max-height: 90vh;
                padding: 24px 20px 30px;
                animation: slideUp 0.25s ease;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(60px);
                    opacity: 0;
                }

                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 12px 6px;
            }

            .stat-card h3 {
                font-size: 18px;
            }

            .stat-card p {
                font-size: 11px;
            }

            .add-btn {
                font-size: 14px;
                padding: 12px;
            }

            .modal-actions {
                flex-direction: column;
            }

            .product-card-mobile .name {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- Admin Navbar -->
    <nav class="admin-nav">
        <a href="index.html" class="brand">
            <img src="Images/Logo.jpg" alt="Logo">
            Mandi Trendz <span>(Admin)</span>
        </a>
        <div class="nav-right">
            <a href="index.html"><i class='bx bx-globe'></i> View Site</a>
            <button class="logout-btn" onclick="logout()"><i class='bx bx-log-out'></i> Log Out</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content-container">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalProducts">—</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <h3 id="inStockCount">—</h3>
                <p>In Stock</p>
            </div>
            <div class="stat-card">
                <h3 id="outOfStockCount">—</h3>
                <p>Out of Stock</p>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <h2>Inventory Management</h2>
            <button class="add-btn" onclick="openModal()">
                <i class='bx bx-plus'></i> Add New Product
            </button>
        </div>

        <!-- Desktop Table -->
        <div class="product-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price (KES)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <tr class="loading-row">
                        <td colspan="5">Loading products...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile Cards -->
        <div class="product-cards-mobile" id="productCards">
            <p style="color:#888; text-align:center;">Loading products...</p>
        </div>

    </div>

    <!-- Add / Edit Modal -->
    <div id="productModal" class="form-modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">

                <div class="input-group">
                    <label>Product Name *</label>
                    <input type="text" id="pName" placeholder="e.g. Classic Tote Bag" required>
                </div>

                <div class="input-group">
                    <label>Category *</label>
                    <select id="pCategory">
                        <option value="Handbags">Handbags</option>
                        <option value="Tote Bags">Tote Bags</option>
                        <option value="Crossbody Bags">Crossbody Bags</option>
                        <option value="Shoulder Bags">Shoulder Bags</option>
                        <option value="Clutches">Clutches</option>
                        <option value="Backpacks">Backpacks</option>
                        <option value="Satchels">Satchels</option>
                        <option value="Mini Bags">Mini Bags</option>
                        <option value="Travel Bags">Travel Bags</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Laptop bags">Laptop Bags</option>
                        <option value="Unisex bags">Unisex Bags</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Price (KES) *</label>
                    <input type="number" id="pPrice" placeholder="e.g. 2500" min="0" required>
                </div>

                <div class="input-group">
                    <label>Product Image</label>
                    <input type="file" id="pImageFile" accept="image/*" style="margin-bottom:6px;">
                    <p style="font-size:12px;color:#888;margin-bottom:6px;">OR paste an Image URL:</p>
                    <input type="url" id="pImageUrl" placeholder="https://example.com/image.jpg">
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="pDescription" rows="3" placeholder="Short product description..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="save-btn" id="saveBtn">Save Product</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>

        /* ── Auth Check ── */
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            loadProducts();
        }
        checkAuth();

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        /* ── Load & Render Products ── */
        async function loadProducts() {
            const { data: products, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Load error:', error);
                return;
            }

            let inStock = 0;
            const tableBody = document.getElementById('productTableBody');
            const cardsEl = document.getElementById('productCards');

            // Clear
            tableBody.innerHTML = '';
            cardsEl.innerHTML = '';

            if (!products || products.length === 0) {
                tableBody.innerHTML = '<tr class="loading-row"><td colspan="5">No products yet. Click "Add New Product" to get started.</td></tr>';
                cardsEl.innerHTML = '<p style="color:#888;text-align:center;">No products yet.</p>';
            } else {
                products.forEach(p => {
                    if (p.in_stock) inStock++;

                    const stockClass = p.in_stock ? 'in-stock' : 'out-of-stock';
                    const stockLabel = p.in_stock ? 'In Stock' : 'Out of Stock';
                    const escapedP = JSON.stringify(p).replace(/"/g, '&quot;');

                    // ── Desktop row ──
                    tableBody.innerHTML += `
                        <tr>
                            <td><img src="${p.image_url || 'Images/Logo.jpg'}" class="thumb" onerror="this.src='Images/Logo.jpg'"></td>
                            <td>${p.name}</td>
                            <td>${p.category}</td>
                            <td>KES ${Number(p.price).toLocaleString()}</td>
                            <td>
                                <div class="actions-td">
                                    <i class='bx bx-edit edit-btn' title="Edit" onclick='editProduct(${escapedP})'></i>
                                    <button class="stock-toggle ${stockClass}" onclick="toggleStock(${p.id}, ${p.in_stock})">
                                        ${stockLabel}
                                    </button>
                                    <i class='bx bx-trash delete-btn' title="Delete" onclick="deleteProduct(${p.id})"></i>
                                </div>
                            </td>
                        </tr>`;

                    // ── Mobile card ──
                    cardsEl.innerHTML += `
                        <div class="product-card-mobile">
                            <img src="${p.image_url || 'Images/Logo.jpg'}" onerror="this.src='Images/Logo.jpg'" alt="${p.name}">
                            <div class="info">
                                <div class="name">${p.name}</div>
                                <div class="meta">${p.category} &nbsp;·&nbsp; KES ${Number(p.price).toLocaleString()}</div>
                                <div class="card-actions">
                                    <i class='bx bx-edit edit-btn' title="Edit" onclick='editProduct(${escapedP})'></i>
                                    <button class="stock-toggle ${stockClass}" onclick="toggleStock(${p.id}, ${p.in_stock})">
                                        ${stockLabel}
                                    </button>
                                    <i class='bx bx-trash delete-btn' title="Delete" onclick="deleteProduct(${p.id})"></i>
                                </div>
                            </div>
                        </div>`;
                });
            }

            // Update stats
            document.getElementById('totalProducts').textContent = products ? products.length : 0;
            document.getElementById('inStockCount').textContent = inStock;
            document.getElementById('outOfStockCount').textContent = products ? (products.length - inStock) : 0;
        }

        /* ── Toggle Stock ── */
        async function toggleStock(id, currentStatus) {
            const { error } = await supabaseClient
                .from('products')
                .update({ in_stock: !currentStatus })
                .eq('id', id);
            if (!error) loadProducts();
            else alert('Error updating stock: ' + error.message);
        }

        /* ── Delete Product ── */
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            const { error } = await supabaseClient.from('products').delete().eq('id', id);
            if (!error) loadProducts();
            else alert('Error deleting product: ' + error.message);
        }

        /* ── Modal Open / Close ── */
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        function editProduct(p) {
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pCategory').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pImageUrl').value = p.image_url || '';
            document.getElementById('pDescription').value = p.description || '';
            document.getElementById('productModal').style.display = 'flex';
        }

        /* Close modal on backdrop click */
        document.getElementById('productModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        /* ── Save Product (Add / Edit) ── */
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            const id = document.getElementById('productId').value;
            const imageFile = document.getElementById('pImageFile').files[0];
            let imageUrl = document.getElementById('pImageUrl').value;

            try {
                // Upload image file if selected
                if (imageFile) {
                    const fileName = `${Date.now()}-${imageFile.name}`;
                    const { data: uploadData, error: uploadError } = await supabaseClient
                        .storage
                        .from('product-images')
                        .upload(fileName, imageFile);

                    if (uploadError) {
                        if (uploadError.message.includes('Bucket not found')) {
                            throw new Error("Please create a public storage bucket named 'product-images' in your Supabase dashboard.");
                        }
                        throw uploadError;
                    }

                    const { data: { publicUrl } } = supabaseClient
                        .storage
                        .from('product-images')
                        .getPublicUrl(fileName);

                    imageUrl = publicUrl;
                }

                const pData = {
                    name: document.getElementById('pName').value.trim(),
                    category: document.getElementById('pCategory').value,
                    price: parseFloat(document.getElementById('pPrice').value),
                    image_url: imageUrl,
                    description: document.getElementById('pDescription').value.trim()
                };

                let err;
                if (id) {
                    ({ error: err } = await supabaseClient.from('products').update(pData).eq('id', id));
                } else {
                    ({ error: err } = await supabaseClient.from('products').insert([{ ...pData, in_stock: true }]));
                }
                if (err) throw err;

                closeModal();
                loadProducts();

            } catch (err) {
                console.error('Save Error:', err);
                alert('Error saving product: ' + err.message);
            } finally {
                saveBtn.textContent = 'Save Product';
                saveBtn.disabled = false;
            }
        });

    </script>
</body>

</html>
