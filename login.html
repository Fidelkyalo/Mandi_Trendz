<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Mandi Trendz</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .login-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #D4AF37;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: #D4AF37;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #D4AF37;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="Images/Logo.jpg" alt="Mandi Trendz Logo" class="nav-logo">
                Mandi Trendz
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>

            <div class="nav-actions">
                <div class="social-icons">
                    <a href="https://wa.me/254742439040" target="_blank" class="whatsapp"><i
                            class='bx bxl-whatsapp'></i></a>
                    <a href="https://www.facebook.com/share/18xL4965JN/" target="_blank" class="facebook"><i
                            class='bx bxl-facebook'></i></a>
                    <a href="https://www.instagram.com/mandi.trendz" target="_blank" class="instagram"><i
                            class='bx bxl-instagram'></i></a>
                    <a href="https://www.tiktok.com/@mandi.trendz" target="_blank" class="tiktok"><i
                            class='bx bxl-tiktok'></i></a>
                    <a href="mailto:emmahmumoh@gmail.com" target="_blank" class="gmail"><i class='bx bxl-gmail'></i></a>
                </div>
                <div class="cart-search">
                    <button class="cart-btn"><span class="cart-count">Thank-you For Shopping With Us</span></button>
                </div>
                <div class="menu-toggle" id="mobile-menu">
                    <i class='bx bx-menu'></i>
                </div>
            </div>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <img src="Images/Logo.jpg" alt="Logo"
                style="width: 80px; border-radius: 50%; margin-bottom: 20px; border: 2px solid #D4AF37;">
            <h2 style="font-family: 'Playfair Display', serif; letter-spacing: 2px;">ADMIN LOGIN</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@manditrendz.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">LOG IN</button>
            </form>
            <p id="errorMsg" class="error-msg"></p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        console.log("Login script initialized");

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Form submitted...");

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = e.target.querySelector('button');

            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                console.log("Attempting sign in for:", email);
                if (typeof supabaseClient === 'undefined') {
                    throw new Error("Supabase client not initialized. Check config.js.");
                }

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    console.error("Login error:", error);
                    errorMsg.textContent = error.message;
                    if (error.message.includes("Email not confirmed")) {
                        errorMsg.textContent = "Please confirm your email in Supabase settings or your inbox.";
                    }
                    errorMsg.style.display = 'block';
                    alert("Error: " + error.message);
                } else {
                    console.log("Login successful!");
                    window.location.href = 'admin.html';
                }
            } catch (err) {
                console.error("Unexpected error:", err);
                errorMsg.textContent = "An unexpected error occurred: " + err.message;
                errorMsg.style.display = 'block';
                alert("Unexpected Error: " + err.message);
            } finally {
                submitBtn.textContent = 'Log In';
                submitBtn.disabled = false;
            }
        });

        // Check session
        if (typeof supabaseClient !== 'undefined') {
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    console.log("Active session found, redirecting...");
                    window.location.href = 'admin.html';
                }
            });
        }
    </script>
</body>

</html>
