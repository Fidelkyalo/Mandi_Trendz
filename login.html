<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Mandi Trendz</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .login-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #D4AF37;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: #D4AF37;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #D4AF37;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <img src="Images/Logo.jpg" alt="Logo"
                style="width: 80px; border-radius: 50%; margin-bottom: 20px; border: 2px solid #D4AF37;">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@manditrendz.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <p id="errorMsg" class="error-msg"></p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                localStorage.setItem('supabase.auth.token', data.session.access_token);
                window.location.href = 'admin.html';
            }
        });

        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'admin.html';
        });
    </script>
</body>

</html>
